name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-server:
    name: API Server (Node.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: banking_api_server/package-lock.json

      - name: Install dependencies
        working-directory: banking_api_server
        run: npm ci

      # Full suite includes session tests; for a faster local session-only check: npm run test:session
      - name: Run tests
        working-directory: banking_api_server
        run: npm test -- --forceExit --passWithNoTests
        env:
          NODE_ENV: test
          # Disable token signature validation so tests do not need PingOne
          SKIP_TOKEN_SIGNATURE_VALIDATION: 'true'

  ui:
    name: UI (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: banking_api_ui/package-lock.json

      - name: Install dependencies
        working-directory: banking_api_ui
        run: npm ci

      - name: Run tests
        working-directory: banking_api_ui
        run: npm test -- --watchAll=false --passWithNoTests --forceExit
        env:
          CI: 'true'

  e2e-quality:
    name: UI Quality Evaluator (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: banking_api_ui/package-lock.json

      - name: Install dependencies
        working-directory: banking_api_ui
        run: npm ci

      - name: Install Playwright browsers
        working-directory: banking_api_ui
        run: npx playwright install chromium --with-deps

      - name: Run UI quality evaluator
        working-directory: banking_api_ui
        run: npm run test:e2e:quality
        env:
          CI: 'true'
          # CRA dev server is started by Playwright webServer config.
          # Unset CI for the child so webpack can compile with warnings.
          # BANKING_UI_PORT defaults to 3000; leave unset to use the default.

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-quality-report
          path: banking_api_ui/playwright-report/
          retention-days: 7
