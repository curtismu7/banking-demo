---
apiVersion: v1
kind: ConfigMap
metadata:
  name: super-banking-config
  namespace: super-banking
  labels:
    app: super-banking
    component: config
data:
  # Frontend Configuration
  REACT_APP_API_BASE_URL: "http://banking-api-server:3001"
  REACT_APP_MCP_SERVER_URL: "ws://banking-mcp-server:8080"
  REACT_APP_AGENT_SERVICE_URL: "http://banking-agent:8080"
  
  # API Server Configuration
  NODE_ENV: "production"
  PORT: "3001"
  LOG_LEVEL: "info"
  
  # MCP Server Configuration
  MCP_SERVER_HOST: "0.0.0.0"
  MCP_SERVER_PORT: "8080"
  MCP_SERVER_LOG_LEVEL: "info"
  
  # Agent Service Configuration
  AGENT_SERVICE_HOST: "0.0.0.0"
  AGENT_SERVICE_PORT: "8080"
  AGENT_SERVICE_LOG_LEVEL: "info"
  
  # Redis Configuration
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  
  # Banking Configuration
  BANKING_NAME: "Super Banking"
  BANKING_VERSION: "1.0.0"
  BANKING_ENVIRONMENT: "production"
  
  # Feature Flags
  FF_ENABLE_MFA: "true"
  FF_ENABLE_AGENT: "true"
  FF_ENABLE_DEMO_DATA: "true"
  FF_ENABLE_SELF_SERVICE: "true"
  
  # Security Configuration
  SESSION_SECRET: "change-me-in-production"
  JWT_SECRET: "change-me-in-production"
  COOKIE_SECURE: "true"
  COOKIE_SAME_SITE: "strict"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: super-banking
  labels:
    app: super-banking
    component: frontend
data:
  default.conf: |
    server {
        listen 3000;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Handle React Router
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API proxy to banking server
        location /api/ {
            proxy_pass http://banking-api-server:3001/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # WebSocket proxy for MCP
        location /mcp/ {
            proxy_pass http://banking-mcp-server:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: ws: wss: data: blob: 'unsafe-inline'; connect-src 'self' http: https: ws: wss:" always;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss;
    }
