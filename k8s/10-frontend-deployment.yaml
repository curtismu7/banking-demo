---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-frontend
  namespace: super-banking
  labels:
    app: super-banking
    component: frontend
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: super-banking
      component: frontend
  template:
    metadata:
      labels:
        app: super-banking
        component: frontend
        version: v1.0.0
    spec:
      containers:
      - name: frontend
        image: banking-api-ui:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: super-banking-config
              key: NODE_ENV
        - name: REACT_APP_API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: super-banking-config
              key: REACT_APP_API_BASE_URL
        - name: REACT_APP_MCP_SERVER_URL
          valueFrom:
            configMapKeyRef:
              name: super-banking-config
              key: REACT_APP_MCP_SERVER_URL
        - name: REACT_APP_AGENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: super-banking-config
              key: REACT_APP_AGENT_SERVICE_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
---
apiVersion: v1
kind: Service
metadata:
  name: banking-frontend-service
  namespace: super-banking
  labels:
    app: super-banking
    component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: super-banking
    component: frontend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: banking-frontend-ingress
  namespace: super-banking
  labels:
    app: super-banking
    component: frontend
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - super-banking.example.com
    secretName: super-banking-tls
  rules:
  - host: super-banking.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: banking-frontend-service
            port:
              number: 3000
