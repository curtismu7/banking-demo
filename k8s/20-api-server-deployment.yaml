---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-api-server
  namespace: super-banking
  labels:
    app: super-banking
    component: api-server
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: super-banking
      component: api-server
  template:
    metadata:
      labels:
        app: super-banking
        component: api-server
        version: v1.0.0
    spec:
      containers:
      - name: api-server
        image: banking-api-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: super-banking-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: super-banking-config
              key: PORT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: super-banking-config
              key: LOG_LEVEL
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: super-banking-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: super-banking-config
              key: REDIS_PORT
        - name: REDIS_DB
          valueFrom:
            configMapKeyRef:
              name: super-banking-config
              key: REDIS_DB
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: super-banking-secrets
              key: session-secret
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: super-banking-secrets
              key: jwt-secret
        - name: PINGONE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: super-banking-secrets
              key: pingone-client-id
        - name: PINGONE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: super-banking-secrets
              key: pingone-client-secret
        - name: PINGONE_ENVIRONMENT_ID
          valueFrom:
            secretKeyRef:
              name: super-banking-secrets
              key: pingone-environment-id
        - name: PINGONE_REGION
          valueFrom:
            secretKeyRef:
              name: super-banking-secrets
              key: pingone-region
        - name: PINGONE_WORKER_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: super-banking-secrets
              key: pingone-worker-client-id
        - name: PINGONE_WORKER_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: super-banking-secrets
              key: pingone-worker-client-secret
        - name: PINGONE_ADMIN_POPULATION_ID
          valueFrom:
            secretKeyRef:
              name: super-banking-secrets
              key: pingone-admin-population-id
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
      volumes:
      - name: data-volume
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
---
apiVersion: v1
kind: Service
metadata:
  name: banking-api-server-service
  namespace: super-banking
  labels:
    app: super-banking
    component: api-server
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: super-banking
    component: api-server
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: banking-api-server-hpa
  namespace: super-banking
  labels:
    app: super-banking
    component: api-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: banking-api-server
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
