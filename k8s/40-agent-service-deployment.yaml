---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-agent-service
  namespace: super-banking
  labels:
    app: super-banking
    component: agent-service
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: super-banking
      component: agent-service
  template:
    metadata:
      labels:
        app: super-banking
        component: agent-service
        version: v1.0.0
    spec:
      containers:
      - name: agent-service
        image: langchain-agent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: AGENT_SERVICE_HOST
          valueFrom:
            configMapKeyRef:
              name: super-banking-config
              key: AGENT_SERVICE_HOST
        - name: AGENT_SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: super-banking-config
              key: AGENT_SERVICE_PORT
        - name: AGENT_SERVICE_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: super-banking-config
              key: AGENT_SERVICE_LOG_LEVEL
        - name: AGENT_SERVICE_SECRET
          valueFrom:
            secretKeyRef:
              name: super-banking-secrets
              key: agent-service-secret
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: super-banking-secrets
              key: openai-api-key
        - name: PYTHONPATH
          value: "/app/src"
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
        - name: logs-volume
          mountPath: /app/logs
        - name: models-volume
          mountPath: /app/models
      volumes:
      - name: data-volume
        emptyDir: {}
      - name: logs-volume
        emptyDir: {}
      - name: models-volume
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: banking-agent-service
  namespace: super-banking
  labels:
    app: super-banking
    component: agent-service
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: super-banking
    component: agent-service
